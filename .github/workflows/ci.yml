name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + type-check ─────────────────────────────────────────────
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy pydantic-settings pydantic fastapi sqlalchemy

      - name: Lint (ruff)
        run: ruff check app/

      - name: Type-check (mypy)
        run: mypy app/ --ignore-missing-imports --no-strict-optional

  # ── Frontend: lint ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint (next lint)
        run: npm run lint
