[mypy]
ignore_missing_imports = True
no_strict_optional = True
# SQLAlchemy 2.x Column[] types require the plugin for accurate inference.
# Without sqlalchemy2-stubs (not installed in CI), ORM attribute access
# produces false positives. Per-module overrides suppress these below.
plugins = sqlalchemy.ext.mypy.plugin

# ── API layer ─────────────────────────────────────────────────────────────────
[mypy-app.api.modules]
disable_error_code = assignment,arg-type,call-overload

[mypy-app.api.signals]
disable_error_code = assignment,arg-type

[mypy-app.api.jobs]
disable_error_code = assignment,arg-type

[mypy-app.api.billing]
disable_error_code = assignment,arg-type

[mypy-app.api.admin]
disable_error_code = assignment,arg-type,attr-defined

# ── Core layer ────────────────────────────────────────────────────────────────
[mypy-app.core.job_runner]
disable_error_code = assignment,arg-type,var-annotated

# ── Models ────────────────────────────────────────────────────────────────────
# Column(ARRAY(...)) etc. can't be inferred without stubs → suppress var-annotated
[mypy-app.models.database]
disable_error_code = var-annotated

# ── Config ────────────────────────────────────────────────────────────────────
# pydantic-settings reads required fields from env; mypy sees them as missing.
[mypy-app.config]
disable_error_code = call-arg

# ── Module implementations ────────────────────────────────────────────────────
[mypy-app.modules.voice_biomarker_tracker]
disable_error_code = assignment,arg-type

[mypy-app.modules.fencing_analytics]
disable_error_code = assignment,arg-type,var-annotated,index,type-var,call-overload

[mypy-app.modules.chronotype_planner]
disable_error_code = assignment,arg-type
